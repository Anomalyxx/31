<!DOCTYPE html>
<html lang="en" style="color-scheme: dark;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment — HexShield</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --border:    #141414;
      --border-md: #1e1e1e;
      --border-hi: #282828;
      --text-muted: #555555;
      --text-dim:   #888888;
      --silver:     #dadada;
    }

    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', 'Courier New', monospace;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 130px 40px 60px 12%;
      position: relative;
      overflow-x: hidden;
    }

    /* CRT scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,.005) 2px,
        rgba(255,255,255,.005) 4px
      );
    }

    /* Moving scan line */
    .scan {
      position: fixed;
      top: 0;
      left: -100%;
      width: 100%;
      height: 1px;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.10), transparent);
      animation: scan 7s linear infinite;
    }
    @keyframes scan { to { left: 100%; } }

    .container {
      width: 100%;
      max-width: 580px;
      text-align: left;
      position: relative;
      z-index: 10;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-bottom: 52px;
    }

    .logo-section img {
      width: 82px;
      height: auto;
      filter: drop-shadow(0 0 12px rgba(255,255,255,.07));
    }

    .header-right {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .site-name {
      font-size: 1.7rem;
      color: #ffffff;
      font-weight: 400;
      letter-spacing: .5px;
    }

    .protection-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .58rem;
      letter-spacing: 1.8px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .protection-tag::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3a3a3a;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: .4; }
      50%       { opacity: 1; }
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      width: 100%;
      margin-bottom: 32px;
    }

    /* Status row */
    .status-line {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .82rem;
      color: var(--silver);
      letter-spacing: .5px;
      margin-bottom: 22px;
    }

    .status-icon {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border-hi);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-icon.loading::after {
      content: '';
      width: 8px;
      height: 8px;
      border: 1.5px solid rgba(255,255,255,.08);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Progress panel */
    .progress-section {
      padding: 22px 24px;
      background: rgba(255,255,255,.018);
      border: 1px solid var(--border);
      border-radius: 2px;
      width: 100%;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .progress-label-text {
      font-size: .58rem;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .progress-pct {
      font-size: .58rem;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .progress-bar-container {
      width: 100%;
      height: 1px;
      background: var(--border-hi);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .progress-bar {
      height: 100%;
      background: #ffffff;
      width: 0%;
      transition: width .1s linear;
    }

    /* Step list */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .62rem;
      letter-spacing: .8px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity .35s ease, color .3s;
    }

    .step.show { opacity: 1; }
    .step.active { color: var(--silver); }
    .step.done   { color: #404040; }

    .step-dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    /* ── CAPTCHA SECTION ── */
    .captcha-section {
      width: 100%;
      margin-bottom: 40px;
      padding: 20px 24px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: rgba(255,255,255,.012);
    }

    .captcha-label {
      font-size: .56rem;
      letter-spacing: 1.8px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: block;
    }

    .captcha-inner {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      min-height: 65px;
    }

    /* Force Turnstile dark */
    iframe, #cf-wrapper, #cf-challenge, #challenge-stage, .cloudflare-wrapper {
      color-scheme: dark !important;
      background: transparent !important;
    }

    /* ── FOOTER ── */
    .footer {
      padding-top: 28px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .footer-item {
      font-size: .68rem;
      color: var(--text-muted);
      letter-spacing: .5px;
      display: flex;
      align-items: baseline;
      gap: 0;
    }

    .footer-key {
      display: inline-block;
      width: 80px;
      flex-shrink: 0;
    }

    .footer-val {
      color: var(--text-dim);
      font-weight: 400;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .footer-brand img {
      width: 14px;
      height: auto;
      opacity: .2;
    }

    .footer-brand span {
      font-size: .6rem;
      color: var(--text-muted);
      letter-spacing: .5px;
    }

    /* Responsive */
    @media (max-width: 992px) { body { padding-left: 6%; } }
    @media (max-width: 768px) {
      body { padding: 80px 24px 40px 24px; }
      .header { gap: 16px; margin-bottom: 36px; }
      .logo-section img { width: 58px; }
      .site-name { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="scan"></div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-section">
      <img src="https://i.hizliresim.com/1zyg71m.png" alt="HexShield">
    </div>
    <div class="header-right">
      <div class="site-name" id="hostTitle">l7hard.cc</div>
      <div class="protection-tag">HexShield</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-content">
    <div class="status-line">
      <div class="status-icon loading" id="statusIcon"></div>
      <span id="statusText">Checking your browser...</span>
    </div>

    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label-text">Verification Progress</span>
        <span class="progress-pct" id="pctLabel">0%</span>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="steps">
        <div class="step" id="s1"><div class="step-dot"></div>Browser fingerprint</div>
        <div class="step" id="s2"><div class="step-dot"></div>TLS handshake validation</div>
        <div class="step" id="s3"><div class="step-dot"></div>Behavioral analysis</div>
        <div class="step" id="s4"><div class="step-dot"></div>Awaiting challenge token</div>
      </div>
    </div>
  </div>

  <!-- CAPTCHA -->
  <div class="captcha-section">
    <span class="captcha-label">Security challenge</span>
    <div class="captcha-inner">
      ::CAPTCHA_BOX::
    </div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-item">
      <span class="footer-key">Ray ID</span>
      <span class="footer-val" id="rayId">—</span>
    </div>
    <div class="footer-item">
      <span class="footer-key">Your IP</span>
      <span class="footer-val" id="userIp">Detecting...</span>
    </div>
    <div class="footer-item">
      <span class="footer-key">Data Center</span>
      <span class="footer-val" id="dcNode">Detecting...</span>
    </div>

    <div class="footer-brand">
      <img src="https://i.hizliresim.com/1zyg71m.png" alt="">
      <span>Performance &amp; security by HexShield</span>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // Host
  const host = window.location.hostname || 'l7hard.cc';
  document.getElementById('hostTitle').textContent = host;

  // Ray ID
  const chars = '0123456789abcdef';
  let ray = '';
  for (let i = 0; i < 16; i++) ray += chars[Math.floor(Math.random() * 16)];
  document.getElementById('rayId').textContent = ray.match(/.{4}/g).join('-').toUpperCase();

  // DC
  const dcs = ['AMS01','FRA02','SIN03','LAX04','ORD05','LHR06','NRT07','SYD08'];
  document.getElementById('dcNode').textContent = dcs[Math.floor(Math.random() * dcs.length)];

  // IP
  fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(d => { document.getElementById('userIp').textContent = d.ip; })
    .catch(() => {
      document.getElementById('userIp').textContent =
        '104.28.' + Math.floor(Math.random() * 254) + '.' + Math.floor(Math.random() * 254);
    });

  // Progress
  const bar    = document.getElementById('progressBar');
  const pct    = document.getElementById('pctLabel');
  const status = document.getElementById('statusText');
  const icon   = document.getElementById('statusIcon');

  const steps    = ['s1','s2','s3','s4'].map(id => document.getElementById(id));
  const triggers = [0, 0.20, 0.52, 0.80];
  const labels   = [
    'Analyzing browser fingerprint...',
    'Validating TLS certificate...',
    'Running behavioral analysis...',
    'Awaiting challenge token...'
  ];
  const revealed = [false, false, false, false];
  let activeStep = -1;

  const TOTAL = 3000;
  let start = null;

  function tick(ts) {
    if (!start) start = ts;
    const progress = Math.min((ts - start) / TOTAL, 1);
    const p = Math.floor(progress * 100);

    bar.style.width = p + '%';
    pct.textContent = p + '%';

    triggers.forEach((t, i) => {
      if (progress >= t && !revealed[i]) {
        revealed[i] = true;
        if (activeStep >= 0) {
          steps[activeStep].classList.remove('active');
          steps[activeStep].classList.add('done');
        }
        steps[i].classList.add('show', 'active');
        activeStep = i;
        status.textContent = labels[i];
      }
    });

    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      pct.textContent = '100%';
      status.textContent = '100% ENVIRONMENT_VERIFIED // AWAITING TOKEN';
      if (activeStep >= 0) {
        steps[activeStep].classList.remove('active');
        steps[activeStep].classList.add('done');
      }
      icon.classList.remove('loading');
    }
  }

  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
