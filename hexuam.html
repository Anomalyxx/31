<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment — HexShield</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --border: #141414;
      --border-mid: #222222;
      --text-muted: #555555;
      --text-dim: #888888;
      --silver: #dadada;
    }

    body {
      font-family: 'SF Mono', 'Monaco', 'Consolas', 'Courier New', monospace;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center; /* Konteyneri ekranda dengeli ortalar */
      align-items: flex-start;
      padding: 140px 60px 60px 60px; /* Hafif yana alma hissi için hassas sol/sağ boşluk */
      position: relative;
      overflow-x: hidden;
    }

    /* Arka Plan CRT / Scanline Efekti */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,.005) 2px, rgba(255,255,255,.005) 4px);
    }

    /* Hareketli Gümüş HUD Tarama Çizgisi */
    .scan {
      position: fixed; top: 0; left: -100%; width: 100%; height: 1px; z-index: 2; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
      animation: scan 7s linear infinite;
    }
    @keyframes scan { to { left: 100%; } }

    /* Kurumsal Güvenli Grid (İçerik kendi içinde sola yaslı, genel yapı dengeli) */
    .container {
      width: 100%;
      max-width: 900px;
      text-align: left;
      position: relative;
      z-index: 10;
    }

    /* Kurumsal Başlık Alanı */
    .header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 64px;
    }

    .logo-section {
      display: flex;
      align-items: center;
    }

    /* İstediğin gibi büyütülmüş ultra keskin kurumsal logo (75px) */
    .logo-section img {
      width: 75px;
      height: auto;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.08));
    }

    .site-info {
      font-size: 1.65rem;
      color: #ffffff;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .main-content {
      width: 100%;
      margin-bottom: 48px;
    }

    /* Durum Satırı */
    .status-line {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.9rem;
      color: var(--silver);
      letter-spacing: 0.5px;
      margin-bottom: 32px;
    }

    /* Teknolojik Döngüsel Yükleyici */
    .status-icon {
      width: 18px;
      height: 18px;
      border: 1px solid var(--border-mid);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-icon.loading::after {
      content: '';
      width: 8px;
      height: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* İlerleme Segmenti */
    .progress-section {
      margin: 24px 0 32px 0;
      padding: 24px;
      background: rgba(2, 2, 2, 0.4);
      border: 1px solid var(--border);
      border-radius: 2px;
      max-width: 540px;
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background: var(--border-mid);
      overflow: hidden;
      margin: 16px 0 8px 0;
    }

    .progress-bar {
      height: 100%;
      background: #ffffff;
      width: 0%;
      transition: width 0.1s linear;
    }

    .progress-text {
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* Cloudflare Doğrulama Kutusu (Sistem buraya kusursuz oturacak) */
    .captcha-viewport {
      max-width: 540px;
      width: 100%;
      margin: 24px 0;
      padding: 20px;
      background: rgba(3, 3, 3, 0.85);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      min-height: 84px;
    }

    /* Konsol Tipi Altyapı Bilgi Alanı */
    .footer {
      margin-top: 56px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer-item {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .footer-item span {
      display: inline-block;
      width: 90px;
    }

    .footer-item strong {
      color: var(--text-dim);
      font-weight: normal;
    }

    .footer-shield {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .footer-shield img {
      width: 16px;
      height: auto;
      opacity: 0.3;
    }

    .footer-shield span {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    @media (max-width: 768px) {
      body { padding: 80px 24px 40px 24px; }
      .header { margin-bottom: 48px; gap: 20px; }
      .logo-section img { width: 60px; }
      .site-info { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="scan"></div>

  <div class="container">
    <div class="header">
      <div class="logo-section">
        <img src="https://i.hizliresim.com/1zyg71m.png" alt="HexShield">
      </div>
      <div class="site-info" id="hostTitle">hexbear.xyz</div>
    </div>

    <div class="main-content">
      <div class="status-line">
        <div class="status-icon loading" id="statusIcon"></div>
        <span id="statusText">Checking your browser...</span>
      </div>

      <div class="progress-section">
        <div class="progress-text" id="progressText">0% MATRIX_CHECK</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="captcha-viewport">
        ::CAPTCHA_BOX::
      </div>
    </div>

    <div class="footer">
      <div class="footer-item">
        <span>Ray ID:</span>
        <strong id="rayId">—</strong>
      </div>
      <div class="footer-item">
        <span>Your IP:</span>
        <strong id="userIp">DETECTING...</strong>
      </div>
      <div class="footer-shield">
        <img src="https://i.hizliresim.com/1zyg71m.png" alt="HexShield">
        <span>Performance &amp; security by HexShield</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      const CONFIG = { processingTime: 2500 };
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');

      /* Canlı Domain Ataması */
      const currentHost = window.location.hostname || "hexbear.xyz";
      document.getElementById('hostTitle').textContent = currentHost;

      function generateRayId() {
        const chars = '0123456789abcdef';
        let id = '';
        for (let i = 0; i < 16; i++) {
          id += chars[Math.floor(Math.random() * chars.length)];
        }
        return id.match(/.{1,4}/g).join('-');
      }

      let startTime = Date.now();
      function updateProgress() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min((elapsed / CONFIG.processingTime) * 100, 100);
        
        progressBar.style.width = progress + '%';
        progressText.textContent = Math.floor(progress) + '% COMPLETE';

        if (progress < 100) {
          requestAnimationFrame(updateProgress);
        }
      }

      document.getElementById('rayId').textContent = generateRayId().toUpperCase();

      async function fetchUserIP() {
        try {
          const response = await fetch('https://api.ipify.org?format=json');
          const data = await response.json();
          document.getElementById('userIp').textContent = data.ip;
        } catch (error) {
          document.getElementById('userIp').textContent = '104.28.' + Math.floor(Math.random() * 254) + '.249';
        }
      }
      
      fetchUserIP();
      requestAnimationFrame(updateProgress);
    })();
  </script>
</body>
</html>
